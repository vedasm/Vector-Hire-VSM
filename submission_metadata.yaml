# Redrob Hackathon — Submission Metadata Template
#
# Copy this file to your repo root as `submission_metadata.yaml` and fill it in.
# The fields here should match what you submit via the portal at upload time.
# Stage 3 review uses this file to verify your portal metadata.

# ============================================================================
# Team identity
# ============================================================================
team_name: "Vector-Hire-VSM"  # Used in leaderboard and announcements

primary_contact:
  name: "Veda Siva Manimuthu"
  email: "sivamanimuthu.veda@gmail.com"   # Used for all organizer communication
  phone: "+91-8807049495"        # Used for top-50 / top-10 outreach

team_members:
  - name: "Veda Siva Manimuthu"
    email: "sivamanimuthu.veda@gmail.com"
    role: "Student"          # Optional, e.g. "Team Lead", "Backend", "Data"
  # Add more members as needed; solo participants list just one member

# ============================================================================
# Code and reproducibility
# ============================================================================
github_repo: "https://github.com/vedasm/Vector-Hire-VSM"
# Required. Must be reachable. Private repos OK if you can grant organizer
# access at Stage 3 (the email to add will be communicated then).

sandbox_link: "https://huggingface.co/spaces/vedasm/Vector-Hire"
# Required. A working hosted environment where the ranker can be run on a small
# candidate sample. See Section 10.5 of submission_spec.md for acceptable
# platforms (HuggingFace Spaces, Streamlit Cloud, Replit, Colab, Docker, Binder).

reproduce_command: "python rank.py --candidates ./data/candidates.jsonl --out ./submission.csv "
# The single command that produces submission.csv from candidates.jsonl.
# Should run end-to-end within 5 minutes on CPU with 16GB RAM and no network.

# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "Lenovo IdeaPad Pro 5"                    # Or: "AWS EC2 c5.4xlarge", "Local Linux box", etc.
  cpu_cores: 14                                  # Number of CPU cores used
  ram_gb: 32                                    # Available RAM in GB
  python_version: "3.14.5"                      # python --version
  os: "Windows 11"                              # Or "Ubuntu 22.04 LTS", etc.
  uses_gpu_for_inference: false                 # Must be false — see compute constraints
  has_network_during_ranking: false             # Must be false — no API calls during ranking
  pre_computation_required: false               # true if you pre-compute embeddings or train models offline
  pre_computation_time_minutes: 0               # Approximate, if applicable

# ============================================================================
# AI tools declaration
# ============================================================================
# Transparency only — declared use is NOT penalized. Be honest. Stage 5 interview
# may verify these declarations against your code; declarations that contradict
# your code or your interview are flagged.
ai_tools_used:
  - "Claude"        # e.g. for architecture discussion, code review
  - "GitHub Copilot"  # e.g. for autocomplete
  # Other options: "ChatGPT", "Cursor", "Gemini", "Codeium", "Other", "None"

ai_usage_summary: |
  - "Claude & ChatGPT was used during development for code review, bug fixes, and all-MiniLM-L6-v2 model downloading and fine-tuning response and score."
  - "GitHub Copilot was used for autocomplete and code suggestions during development."
  - "Also used ChatGPT for uploading model which had high file size and was not uploading successfully via GitHub. ChatGPT provided guidance on how to use Git LFS for uploading large files to GitHub."

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  ≤200 word summary of your approach. Strongly recommended.

  Example:
  "A two-stage candidate ranking pipeline that scores and ranks the top 100 candidates
  from a 100K pool against a Senior AI Engineer job description. Stage 1 uses rule-based
  scoring to filter down to 1,000 candidates; Stage 2 applies semantic reranking using 
  all-MiniLM-L6-v2 to produce the final top 100.
  
  Stage 1 — Rule-based scoring: Filters ~100K candidates down to the top 1,000 using signal-weighted heuristics (skills, title, experience, behavioral signals, location).
  Stage 2 — Semantic reranking: Re-ranks the top 1,000 using cosine similarity between candidate embeddings and the JD embedding, computed with all-MiniLM-L6-v2. Final score blends both stages (65% rule / 35% semantic).
  Remove honeypot / invalid candidates from the final output. The entire pipeline runs in under 5 minutes on CPU with 16GB RAM and no network access during ranking."

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true        # I have read submission_spec.md in full
  code_is_original_work: true       # My code is my team's original work (using AI as a tool is fine)
  no_collusion: true                # I have not coordinated my submission with other teams
  honeypot_check_done: true        # OPTIONAL — set true if you explicitly checked for honeypots in your ranking
  reproduction_tested: true         # I have tested that my reproduce_command runs end-to-end
