name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Create a fresh repo with only the files we need (no history with large files)
          cd $GITHUB_WORKSPACE
          
          # Set up a temp directory with a fresh git repo
          tmp_dir=$(mktemp -d)
          
          # Copy only the files needed for deployment
          cp README.md Dockerfile requirements.txt app.py main.py "$tmp_dir/"
          mkdir -p "$tmp_dir/data"
          cp data/job_description.md data/candidate_schema.json data/sample_candidates.json "$tmp_dir/data/"
          
          cd "$tmp_dir"
          git init -b main
          git config user.email "vedasm@users.noreply.github.com"
          git config user.name "vedasm"
          git add .
          git commit -m "Deploy to HF Spaces"
          git remote add hf https://vedasm:$HF_TOKEN@huggingface.co/spaces/vedasm/Vector-Hire
          git push hf main --force
